name: Build & Publish CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Haskell setup ────────────────────────────────────────────────────────
      - name: Set up GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.12.1.0"

      # ── Cabal dependency cache ────────────────────────────────────────────────
      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('cv-builder.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      # ── Build cv-builder ──────────────────────────────────────────────────────
      - name: Build cv-builder
        run: cabal build cv-builder

      # ── Generate section .tex files ───────────────────────────────────────────
      - name: Generate LaTeX sections from YAML + templates
        run: cabal run cv-builder

      # ── Compile PDF with LuaLaTeX ─────────────────────────────────────────────
      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true

      # ── Prepare GitHub Pages deployment directory ─────────────────────────────
      - name: Prepare Pages directory
        run: |
          mkdir -p _site
          cp main.pdf          _site/resume.pdf
          cp index.html        _site/index.html
          cp data/profile.yaml _site/profile.yaml

      # ── Deploy to GitHub Pages ────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
