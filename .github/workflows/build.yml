name: Build & Publish CV

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g. v2026.03.05). Defaults to today.'
        required: false
        type: string

permissions:
  contents: write   # needed to create Releases and push gh-pages

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install jq (for generate.sh) ─────────────────────────────────────
      - name: Install jq
        run: sudo apt-get install -y jq

      # ── 3. Generate .tex fragments from profile.json ─────────────────────────
      #       MUST come before the LaTeX compile step
      - name: Generate section .tex files
        run: bash generate.sh

      # ── 4. Compile PDF (LuaLaTeX for fontspec/Roboto support) ────────────────
      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: lualatex
          args: -interaction=nonstopmode -file-line-error
          extra_system_packages: fonts-roboto

      # ── 5. Determine release tag ─────────────────────────────────────────────
      - name: Set release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version_tag }}" ]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          fi

      # ── 6. Create versioned GitHub Release with PDF attached ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CV — ${{ steps.tag.outputs.tag }}"
          body: "Auto-generated from profile.json"
          files: main.pdf

      # ── 7. Deploy latest PDF + JSON to GitHub Pages ──────────────────────────
      - name: Prepare Pages directory
        run: |
          mkdir -p _site
          cp main.pdf _site/cv.pdf
          cp profile.json _site/profile.json
          echo '<meta http-equiv="refresh" content="0; url=cv.pdf">' > _site/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
