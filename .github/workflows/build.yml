name: Build & Publish CV

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate section .tex files
        run: bash generate.sh

      - name: Compile PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true

      - name: Workaround if glyphtounicode persists (optional)
        if: failure()
        run: |
          docker run --rm -v $(pwd):/workdir ghcr.io/xu-cheng/texlive-full:latest lualatex -interaction=nonstopmode /workdir/main.tex

      - name: Prepare root files
        run: |
          cp main.pdf CV.pdf || true
          cp profile.json profile.json || true
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>CV</title>
            <script src="https://mozilla.github.io/pdf.js/build/pdf.js"></script>
            <style>html,body{margin:0;height:100%;overflow:hidden;}#pdfViewer{border:1px solid #ccc;width:100%;height:100%;}</style>
          </head>
          <body>
            <canvas id="pdfViewer"></canvas>
            <script>
              const url = 'CV.pdf';
              pdfjsLib.getDocument(url).promise.then(pdf => {
                pdf.getPage(1).then(page => {
                  const canvas = document.getElementById('pdfViewer');
                  const ctx = canvas.getContext('2d');
                  const viewport = page.getViewport({scale:1.5});
                  canvas.height = viewport.height;
                  canvas.width = viewport.width;
                  page.render({canvasContext:ctx,viewport});
                });
              }).catch(console.error);
            </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
